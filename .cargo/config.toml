[target.aarch64-linux-android]
linker = "aarch64-linux-android30-clang"

[target.armv7-linux-androideabi]
linker = "armv7a-linux-androideabi30-clang"

[target.x86_64-linux-android]
linker = "x86_64-linux-android30-clang"

[target.i686-linux-android]
linker = "i686-linux-android30-clang"

[alias]
android-sysprop = "run -p cargo-android-sysprop --bin cargo-android-sysprop --"
push-resetprop = "run -p cargo-android-sysprop --bin resetprop-tester -- --target aarch64-linux-android"
test-resetprop = "run -p cargo-android-sysprop --bin resetprop-tester -- --target aarch64-linux-android --run-test"
